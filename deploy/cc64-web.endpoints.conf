# rpi6 — install as /etc/apache2/endpoints.d/cc64-web.conf
#
# Proxies https://rpi6.memention.net/cc64-web -> local python server on :9007.
# The prefix is KEPT (the server routes under /cc64-web itself), matching the
# /ds and /family endpoints. The /cc64-web/ rule comes first so longest-prefix
# keeps /cc64-web/* on it.
ProxyPass        /cc64-web/ http://localhost:9007/cc64-web/
ProxyPassReverse /cc64-web/ http://localhost:9007/cc64-web/
ProxyPass        /cc64-web  http://localhost:9007/cc64-web
ProxyPassReverse /cc64-web  http://localhost:9007/cc64-web
